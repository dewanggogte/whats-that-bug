name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      PARTYKIT_LOGIN: ${{ secrets.PARTYKIT_LOGIN }}
      PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
      PARTYKIT_TEAM: ${{ secrets.PARTYKIT_TEAM }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel output
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          PUBLIC_PARTY_HOST: ${{ vars.PUBLIC_PARTY_HOST }}

      - name: Deploy PartyKit
        run: npm run deploy:party

      - name: Deploy Vercel
        run: npx vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}
